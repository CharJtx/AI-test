<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KOL Outfit Explorer</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0d1117;--surface:#161b22;--surface2:#1c2129;--border:#30363d;--text:#e6edf3;--text-muted:#8b949e;--accent:#58a6ff;--accent-hover:#79b8ff;--danger:#f85149;--success:#3fb950;--warning:#d29922;--radius:8px}
    html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

    header{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid var(--border);background:var(--surface)}
    header h1{font-size:18px;font-weight:600}
    header a{color:var(--text-muted);text-decoration:none;font-size:13px}
    header a:hover{color:var(--accent)}

    .toolbar{display:flex;gap:10px;align-items:center;padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap}
    .toolbar button{padding:6px 16px;font-size:13px;font-weight:500;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;transition:background .15s}
    .toolbar button:hover{background:var(--accent-hover)}
    .toolbar button:disabled{opacity:.5;cursor:not-allowed}
    .toolbar button.secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
    .toolbar button.secondary:hover{border-color:var(--accent);color:var(--accent)}
    .toolbar button.batch{background:#2ea043;color:#fff}
    .toolbar button.batch:hover{background:#3fb950}
    .toolbar .spacer{flex:1}
    .toolbar .info{font-size:12px;color:var(--text-muted)}

    .container{padding:20px 24px}
    .status-msg{text-align:center;padding:60px 20px;color:var(--text-muted);font-size:14px}
    .status-msg.error{color:var(--danger)}

    .outfit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
    .outfit-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .15s}
    .outfit-card:hover{border-color:var(--accent)}
    .outfit-card.has-char{border-left:3px solid var(--success)}
    .outfit-img{width:100%;aspect-ratio:3/4;object-fit:cover;background:var(--surface2);display:block}
    .outfit-img-placeholder{width:100%;aspect-ratio:3/4;background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:13px}
    .outfit-info{padding:12px}
    .outfit-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
    .outfit-kol-name{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .outfit-code{font-size:11px;color:var(--text-muted);font-family:monospace}
    .outfit-badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
    .outfit-badge{font-size:10px;padding:1px 6px;border-radius:8px;background:var(--surface2);color:var(--text-muted);border:1px solid var(--border)}

    .gen-section{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
    .gen-row{display:flex;gap:6px;align-items:center}
    .gen-input{flex:1;padding:5px 8px;font-size:12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);outline:none}
    .gen-input:focus{border-color:var(--accent)}
    .gen-btn{padding:5px 12px;font-size:12px;font-weight:500;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;white-space:nowrap}
    .gen-btn:hover{background:var(--accent-hover)}
    .gen-btn:disabled{opacity:.5;cursor:not-allowed}
    .gen-btn.revise{background:var(--warning);color:#000}
    .gen-btn.revise:hover{background:#e3a831}

    .char-result{margin-top:10px;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);font-size:12px;max-height:500px;overflow-y:auto}
    .char-result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;position:sticky;top:0;background:var(--bg);z-index:1;padding-bottom:4px}
    .char-result-name{font-size:14px;font-weight:600;color:var(--accent)}
    .char-version-select{padding:2px 6px;font-size:11px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:4px}
    .char-field{margin-top:4px}
    .char-field-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;position:sticky;top:28px;background:var(--bg);z-index:1;padding:2px 0}
    .char-field-value{color:var(--text);margin-top:1px;word-break:break-word;white-space:pre-wrap}
    .char-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
    .char-tag{font-size:10px;padding:1px 6px;border-radius:8px;background:rgba(88,166,255,.15);color:var(--accent)}

    .revise-row{display:flex;gap:6px;align-items:center;margin-top:8px}

    .pagination{display:flex;justify-content:center;align-items:center;gap:14px;padding:24px 0}
    .pagination button{padding:8px 20px;font-size:13px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer}
    .pagination button:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
    .pagination button:disabled{opacity:.3;cursor:not-allowed}
    .pagination .page-info{font-size:13px;color:var(--text-muted)}

    .generating-indicator{display:inline-block;font-size:11px;color:var(--warning);margin-left:6px}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .generating-indicator.active{animation:pulse 1.2s infinite}
  </style>
</head>
<body>
  <header>
    <h1>KOL Outfit Explorer</h1>
    <a href="/">← 返回主页</a>
  </header>

  <div class="toolbar">
    <button id="btn-fetch">加载 KOL + Outfits</button>
    <span style="color:var(--text-muted);font-size:12px">|</span>
    <input type="text" id="input-profile-ids" placeholder="输入 profile_id（多个用逗号分隔）" style="padding:5px 10px;font-size:12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);outline:none;width:280px">
    <button id="btn-fetch-ids" class="secondary">按 ID 查询</button>
    <span style="color:var(--text-muted);font-size:12px">|</span>
    <button id="btn-batch" class="batch" disabled>⚡ 一键生成全部未生成</button>
    <span class="spacer"></span>
    <span class="info" id="toolbar-info"></span>
  </div>

  <div class="container">
    <div id="content">
      <div class="status-msg">点击「加载 KOL + Outfits」开始</div>
    </div>
    <div class="pagination" id="pagination" style="display:none">
      <button id="btn-prev" disabled>← 上一页</button>
      <span class="page-info" id="page-info">第 1 页</span>
      <button id="btn-next" disabled>下一页 →</button>
    </div>
  </div>

<script>
const $ = id => document.getElementById(id);
const $content = $("content");
const $pagination = $("pagination");
const $btnFetch = $("btn-fetch");
const $btnBatch = $("btn-batch");
const $btnPrev = $("btn-prev");
const $btnNext = $("btn-next");
const $toolbarInfo = $("toolbar-info");
const $inputIds = $("input-profile-ids");
const $btnFetchIds = $("btn-fetch-ids");

const PAGE_SIZE = 10;
let cursorStack = [null];
let currentPage = 1;
let nextCursor = null;
let loading = false;

let outfitCards = [];
let charMap = {};

$btnFetch.addEventListener("click", () => { cursorStack=[null]; currentPage=1; fetchPage(null); });
$btnPrev.addEventListener("click", () => { if(currentPage<=1)return; currentPage--; cursorStack.pop(); fetchPage(cursorStack[cursorStack.length-1]); });
$btnNext.addEventListener("click", () => { if(!nextCursor)return; currentPage++; cursorStack.push(nextCursor); fetchPage(nextCursor); });
$btnBatch.addEventListener("click", batchGenerate);
$btnFetchIds.addEventListener("click", fetchByProfileIds);
$inputIds.addEventListener("keydown", e => { if (e.key === "Enter") fetchByProfileIds(); });

async function fetchPage(cursor) {
  if (loading) return;
  loading = true;
  $btnFetch.disabled = true;
  $btnFetch.textContent = "加载中...";
  $content.innerHTML = '<div class="status-msg">加载 KOL 列表...</div>';

  const params = new URLSearchParams({page_size: PAGE_SIZE});
  if (cursor) params.set("cursor", cursor);

  try {
    const resp = await fetch(`/api/insnap-proxy/kols?${params}`);
    const data = await resp.json();
    if (data.error) { showError(data.error, data.detail); return; }

    const kols = data.items || [];
    nextCursor = data.next_cursor || null;
    if (kols.length === 0 && currentPage === 1) { $content.innerHTML = '<div class="status-msg">没有 KOL 数据</div>'; return; }

    $content.innerHTML = '<div class="status-msg">加载 Outfits 中...</div>';

    const charResp = await fetch("/api/kol-characters");
    const charData = await charResp.json();
    charMap = {};
    for (const item of (charData.items || [])) {
      charMap[item.key] = item;
    }

    outfitCards = [];
    const outfitPromises = kols.map(async kol => {
      const name = kol.name_override || kol.kol_name || `KOL #${kol.profile_id}`;
      try {
        const oResp = await fetch(`/api/insnap-proxy/kols/${kol.profile_id}/outfits`);
        const oData = await oResp.json();
        if (oData.error || !oData.items) return [];
        return oData.items.map(o => ({
          profile_id: kol.profile_id,
          kol_name: name,
          avatar: kol.avatar,
          outfit_code: o.code,
          usage_types: o.usage_types || [],
          basic_image: o.basic_image,
          basic_video: o.basic_video,
          key: `${kol.profile_id}:${o.code}`,
        }));
      } catch { return []; }
    });

    const results = await Promise.all(outfitPromises);
    outfitCards = results.flat();

    renderOutfits();

    $pagination.style.display = "";
    $btnPrev.disabled = currentPage <= 1;
    $btnNext.disabled = !data.has_more;
    $("page-info").textContent = `第 ${currentPage} 页`;

  } catch (e) {
    showError(e.message);
  } finally {
    loading = false;
    $btnFetch.disabled = false;
    $btnFetch.textContent = "加载 KOL + Outfits";
  }
}

async function fetchByProfileIds() {
  const raw = $inputIds.value.trim();
  if (!raw) { alert("请输入至少一个 profile_id"); return; }
  const ids = [...new Set(raw.split(/[,，\s]+/).map(s => s.trim()).filter(s => /^\d+$/.test(s)))];
  if (ids.length === 0) { alert("未识别到有效的 profile_id"); return; }

  if (loading) return;
  loading = true;
  $btnFetchIds.disabled = true;
  $btnFetchIds.textContent = "查询中...";
  $content.innerHTML = `<div class="status-msg">查询 ${ids.length} 个 KOL...</div>`;
  $pagination.style.display = "none";

  try {
    const charResp = await fetch("/api/kol-characters");
    const charData = await charResp.json();
    charMap = {};
    for (const item of (charData.items || [])) charMap[item.key] = item;

    outfitCards = [];
    let loaded = 0;

    const outfitPromises = ids.map(async id => {
      try {
        const kolResp = await fetch(`/api/insnap-proxy/kols/${id}`);
        const kol = await kolResp.json();
        if (kol.error) return [];
        const name = kol.name_override || kol.kol_name || `KOL #${kol.profile_id}`;

        const oResp = await fetch(`/api/insnap-proxy/kols/${id}/outfits`);
        const oData = await oResp.json();
        if (oData.error || !oData.items) return [];
        loaded++;
        $content.innerHTML = `<div class="status-msg">已加载 ${loaded}/${ids.length} 个 KOL...</div>`;
        return oData.items.map(o => ({
          profile_id: kol.profile_id,
          kol_name: name,
          avatar: kol.avatar,
          outfit_code: o.code,
          usage_types: o.usage_types || [],
          basic_image: o.basic_image,
          basic_video: o.basic_video,
          key: `${kol.profile_id}:${o.code}`,
        }));
      } catch { return []; }
    });

    const results = await Promise.all(outfitPromises);
    outfitCards = results.flat();

    if (outfitCards.length === 0) {
      $content.innerHTML = '<div class="status-msg">未找到任何 Outfit 数据</div>';
      return;
    }

    renderOutfits();
  } catch (e) {
    showError(e.message);
  } finally {
    loading = false;
    $btnFetchIds.disabled = false;
    $btnFetchIds.textContent = "按 ID 查询";
  }
}

function showError(msg, detail) {
  $content.innerHTML = `<div class="status-msg error">错误: ${esc(msg)}<br><small>${esc(detail||"")}</small></div>`;
  $pagination.style.display = "none";
}

function renderOutfits() {
  const ungenCount = outfitCards.filter(c => !charMap[c.key]).length;
  $toolbarInfo.textContent = `${outfitCards.length} 个 Outfit · ${outfitCards.length - ungenCount} 已生成 · ${ungenCount} 未生成`;
  $btnBatch.disabled = ungenCount === 0;

  $content.innerHTML = `<div class="outfit-grid">${outfitCards.map(renderCard).join("")}</div>`;
  bindCardEvents();
}

function renderCard(card) {
  const ch = charMap[card.key];
  const hasChar = !!ch;
  const imgHtml = card.basic_image
    ? `<img class="outfit-img" src="${esc(card.basic_image)}" alt="" loading="lazy">`
    : `<div class="outfit-img-placeholder">无图片</div>`;

  let charHtml = "";
  if (hasChar && ch.versions.length > 0) {
    const latest = ch.versions[ch.versions.length - 1];
    const d = latest.data;
    charHtml = `
      <div class="char-result" data-key="${esc(card.key)}">
        <div class="char-result-header">
          <span class="char-result-name">${esc(d.name || "未命名")}</span>
          <select class="char-version-select" data-key="${esc(card.key)}">
            ${ch.versions.map(v => `<option value="${v.version}" ${v.version===latest.version?"selected":""}">v${v.version}</option>`).join("")}
          </select>
        </div>
        ${renderCharFields(d)}
        <div class="revise-row">
          <input class="gen-input revise-input" data-key="${esc(card.key)}" placeholder="修改指令（如：性格更冷酷）">
          <button class="gen-btn revise revise-btn" data-key="${esc(card.key)}">AI 修改</button>
        </div>
      </div>`;
  }

  return `
    <div class="outfit-card ${hasChar?"has-char":""}" data-key="${esc(card.key)}">
      ${imgHtml}
      <div class="outfit-info">
        <div class="outfit-header">
          <span class="outfit-kol-name">${esc(card.kol_name)}</span>
          <span class="outfit-code">${esc(card.outfit_code)}</span>
        </div>
        ${card.usage_types.length > 0 ? `<div class="outfit-badges">${card.usage_types.map(t=>`<span class="outfit-badge">${esc(t)}</span>`).join("")}</div>` : ""}
        <div class="gen-section">
          <div class="gen-row">
            <input class="gen-input extra-input" data-key="${esc(card.key)}" placeholder="补充设定（可选）">
            <button class="gen-btn generate-btn" data-key="${esc(card.key)}">${hasChar?"重新生成":"生成角色卡"}</button>
          </div>
        </div>
        ${charHtml}
      </div>
    </div>`;
}

function renderCharFields(d) {
  const fields = [
    ["性格", d.personality],
    ["场景", d.scenario],
    ["描述", d.description],
    ["开场白", d.first_mes],
  ];
  let html = "";
  if (d.tags && d.tags.length > 0) {
    html += `<div class="char-tags">${d.tags.map(t=>`<span class="char-tag">${esc(t)}</span>`).join("")}</div>`;
  }
  for (const [label, val] of fields) {
    if (!val) continue;
    html += `<div class="char-field"><div class="char-field-label">${label}</div><div class="char-field-value">${esc(val)}</div></div>`;
  }
  return html;
}

function bindCardEvents() {
  document.querySelectorAll(".generate-btn").forEach(btn => {
    btn.addEventListener("click", () => generateOne(btn.dataset.key));
  });
  document.querySelectorAll(".revise-btn").forEach(btn => {
    btn.addEventListener("click", () => reviseOne(btn.dataset.key));
  });
  document.querySelectorAll(".char-version-select").forEach(sel => {
    sel.addEventListener("change", () => switchVersion(sel.dataset.key, parseInt(sel.value)));
  });
}

async function generateOne(key) {
  const card = outfitCards.find(c => c.key === key);
  if (!card) return;

  const btn = document.querySelector(`.generate-btn[data-key="${CSS.escape(key)}"]`);
  const input = document.querySelector(`.extra-input[data-key="${CSS.escape(key)}"]`);
  if (!btn) return;

  btn.disabled = true;
  btn.textContent = "生成中...";

  try {
    const resp = await fetch("/api/kol-characters/generate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        profile_id: card.profile_id,
        outfit_code: card.outfit_code,
        image_url: card.basic_image,
        kol_name: card.kol_name,
        extra: input?.value || "",
      }),
    });
    const data = await resp.json();
    if (data.error) {
      alert("生成失败: " + data.error);
      return;
    }
    charMap[key] = data.item;
    renderOutfits();
  } catch (e) {
    alert("请求失败: " + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = "生成角色卡";
  }
}

async function reviseOne(key) {
  const input = document.querySelector(`.revise-input[data-key="${CSS.escape(key)}"]`);
  const btn = document.querySelector(`.revise-btn[data-key="${CSS.escape(key)}"]`);
  if (!input || !btn) return;

  const instructions = input.value.trim();
  if (!instructions) { alert("请输入修改指令"); return; }

  btn.disabled = true;
  btn.textContent = "修改中...";

  try {
    const resp = await fetch("/api/kol-characters/revise", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ key, instructions }),
    });
    const data = await resp.json();
    if (data.error) {
      alert("修改失败: " + data.error);
      return;
    }
    charMap[key] = data.item;
    input.value = "";
    renderOutfits();
  } catch (e) {
    alert("请求失败: " + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = "AI 修改";
  }
}

function switchVersion(key, version) {
  const ch = charMap[key];
  if (!ch) return;

  const ver = ch.versions.find(v => v.version === version);
  if (!ver) return;

  const container = document.querySelector(`.char-result[data-key="${CSS.escape(key)}"]`);
  if (!container) return;

  const d = ver.data;
  const nameEl = container.querySelector(".char-result-name");
  if (nameEl) nameEl.textContent = d.name || "未命名";

  const fieldsArea = container.querySelectorAll(".char-field");
  fieldsArea.forEach(el => el.remove());
  const tagsArea = container.querySelector(".char-tags");
  if (tagsArea) tagsArea.remove();

  const reviseRow = container.querySelector(".revise-row");
  const frag = document.createElement("div");
  frag.innerHTML = renderCharFields(d);
  while (frag.firstChild) {
    container.insertBefore(frag.firstChild, reviseRow);
  }
}

async function batchGenerate() {
  const ungeneratedCards = outfitCards.filter(c => !charMap[c.key] && c.basic_image);
  if (ungeneratedCards.length === 0) return;

  if (!confirm(`将为 ${ungeneratedCards.length} 个未生成的 Outfit 批量生成角色卡，这可能需要较长时间。继续？`)) return;

  $btnBatch.disabled = true;
  $btnBatch.textContent = `⚡ 生成中 0/${ungeneratedCards.length}`;

  let completed = 0;
  const CONCURRENCY = 3;

  async function worker(queue) {
    while (queue.length > 0) {
      const card = queue.shift();
      try {
        const resp = await fetch("/api/kol-characters/generate", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({
            profile_id: card.profile_id,
            outfit_code: card.outfit_code,
            image_url: card.basic_image,
            kol_name: card.kol_name,
            extra: "",
          }),
        });
        const data = await resp.json();
        if (!data.error && data.item) {
          charMap[card.key] = data.item;
        }
      } catch {}
      completed++;
      $btnBatch.textContent = `⚡ 生成中 ${completed}/${ungeneratedCards.length}`;
    }
  }

  const queue = [...ungeneratedCards];
  const workers = Array.from({length: Math.min(CONCURRENCY, queue.length)}, () => worker(queue));
  await Promise.all(workers);

  renderOutfits();
  $btnBatch.textContent = "⚡ 一键生成全部未生成";
}

function esc(text) {
  const d = document.createElement("div");
  d.textContent = text || "";
  return d.innerHTML;
}
</script>
</body>
</html>
