<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Model Playground</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <!-- 顶部栏：左侧标题，右侧操作按钮（保存/加载/清空对话） -->
  <header>
    <h1>Model Playground</h1>
    <div class="header-actions">
      <button id="btn-save-chat" title="保存当前对话">💾 保存</button>
      <button id="btn-load-chat" title="查看已保存的对话">📋 记录</button>
      <button id="btn-clear" title="清空对话">清空对话</button>
    </div>
  </header>

  <!-- 主体布局：左侧配置侧栏 + 右侧聊天区域 -->
  <div class="layout">
    <aside class="sidebar">
      <!-- 用户昵称输入，用于对话中标识发言者 -->
      <section class="panel" style="padding-bottom:8px">
        <div style="display:flex;align-items:center;gap:8px">
          <label for="user-name" style="font-size:11px;color:var(--text-muted);white-space:nowrap">你的名字</label>
          <input type="text" id="user-name" placeholder="用户" style="flex:1;padding:4px 8px;font-size:13px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text)">
        </div>
      </section>

      <!-- 角色卡管理：选择/新建/AI生成/导入，以及头像、标签、编辑操作 -->
      <section class="panel">
        <h3>角色卡 Character</h3>
        <div class="char-source-bar" style="display:flex;gap:4px;margin-bottom:6px">
          <button id="btn-src-local" class="char-source-btn active" data-source="local" style="flex:1;padding:4px 0;font-size:11px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;background:var(--accent);color:#fff">本地角色卡</button>
          <button id="btn-src-kol" class="char-source-btn" data-source="kol" style="flex:1;padding:4px 0;font-size:11px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;background:var(--surface);color:var(--text)">KOL 角色卡</button>
        </div>
        <div class="char-bar">
          <select id="char-select"><option value="">-- 未选择角色 --</option></select>
          <button id="btn-new-char" title="新建角色卡">+</button>
          <button id="btn-gen-char" title="AI 生成角色卡">✨</button>
          <button id="btn-import-char" title="导入角色卡 JSON">📂</button>
          <input type="file" id="char-file-input" accept=".json" hidden>
        </div>
        <div id="char-info" class="char-info" hidden>
          <div id="char-avatar-area" class="char-avatar-area" hidden></div>
          <div id="kol-version-bar" class="kol-version-bar" hidden>
            <label for="kol-version-select" style="font-size:11px;color:var(--text-muted)">版本:</label>
            <select id="kol-version-select" style="flex:1;font-size:11px;padding:2px 4px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text)"></select>
          </div>
          <div class="char-info-row">
            <span id="char-tags" class="char-tags"></span>
            <div class="char-info-actions">
              <button id="btn-remix-char" title="AI 改造角色卡">🔄</button>
              <button id="btn-edit-char" title="编辑角色卡">✏️</button>
              <button id="btn-delete-char" class="danger" title="删除角色卡">🗑️</button>
            </div>
          </div>
          <button id="btn-send-greeting" class="btn-greeting">发送开场白</button>
        </div>
      </section>

      <!-- 预设管理：保存/加载/删除完整的配置快照（system prompt、参数、模型等） -->
      <section class="panel">
        <h3>Preset 预设</h3>
        <div class="preset-bar">
          <select id="preset-select"><option value="">-- 选择预设 --</option></select>
          <button id="btn-save-preset" title="保存当前配置为预设">💾</button>
          <button id="btn-delete-preset" title="删除选中预设">🗑️</button>
        </div>
      </section>

      <!-- RP 输出格式选择 -->
      <section class="panel" style="padding-bottom:8px">
        <div style="display:flex;align-items:center;gap:8px">
          <label style="font-size:11px;color:var(--text-muted);white-space:nowrap">输出格式</label>
          <select id="rp-format-mode" style="flex:1;padding:3px 6px;font-size:12px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px">
            <option value="rp">RP 格式 (*动作* 「对话」)</option>
            <option value="dialogue">纯对话（仅台词）</option>
            <option value="none">无格式提示</option>
          </select>
        </div>
      </section>

      <!-- 世界书：按关键词触发注入上下文的知识条目，支持新建/导入/编辑 -->
      <section class="panel">
        <h3>世界书 Lorebook</h3>
        <div class="wb-toolbar">
          <button id="btn-create-wb" title="新建世界书">+ 新建</button>
          <button id="btn-import-wb" title="导入 JSON 文件">📂 导入</button>
          <input type="file" id="wb-file-input" accept=".json" hidden>
        </div>
        <div id="wb-list" class="wb-list"></div>
      </section>

      <!-- 模型选择：可多选，支持搜索和按审核状态过滤 -->
      <section class="panel">
        <h3>模型选择</h3>
        <input type="text" id="model-search" placeholder="搜索模型...">
        <div class="filter-bar">
          <label class="toggle-label">
            <input type="checkbox" id="filter-unmoderated">
            <span>仅显示无审核模型</span>
          </label>
          <span class="model-count" id="model-count"></span>
        </div>
        <div id="model-list" class="model-list"></div>
        <div class="selected-models">
          <span class="label">已选:</span>
          <div id="selected-tags"></div>
        </div>
      </section>

      <!-- TTS 语音：选择音色和语速，用于朗读AI回复 -->
      <section class="panel">
        <h3>语音朗读 TTS</h3>
        <div class="char-field" style="margin-bottom:6px">
          <label>音色</label>
          <select id="tts-voice"></select>
        </div>
        <div class="tts-controls">
          <label style="font-size:11px;color:var(--text-muted)">语速</label>
          <select id="tts-rate" style="font-size:12px;padding:2px 4px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px">
            <option value="-50%">0.5x</option>
            <option value="-25%">0.75x</option>
            <option value="+0%" selected>1.0x</option>
            <option value="+25%">1.25x</option>
            <option value="+50%">1.5x</option>
            <option value="+100%">2.0x</option>
          </select>
        </div>
      </section>

      <!-- 生成参数：Temperature/TopP/MaxTokens/频率惩罚/存在惩罚 -->
      <section class="panel">
        <h3>参数调节</h3>
        <div class="param-group">
          <label>Temperature <span id="temp-val">0.7</span></label>
          <input type="range" id="param-temperature" min="0" max="2" step="0.05" value="0.7">
        </div>
        <div class="param-group">
          <label>Top P <span id="topp-val">1.0</span></label>
          <input type="range" id="param-top-p" min="0" max="1" step="0.05" value="1.0">
        </div>
        <div class="param-group">
          <label>Max Tokens</label>
          <input type="number" id="param-max-tokens" value="2048" min="1" max="128000">
        </div>
        <div class="param-group">
          <label>Frequency Penalty <span id="freq-val">0.0</span></label>
          <input type="range" id="param-freq-penalty" min="0" max="2" step="0.05" value="0">
        </div>
        <div class="param-group">
          <label>Presence Penalty <span id="pres-val">0.0</span></label>
          <input type="range" id="param-pres-penalty" min="0" max="2" step="0.05" value="0">
        </div>
      </section>
    </aside>

    <!-- 聊天区域：每个选中的模型各占一列并行对话，底部为消息输入栏 -->
    <main class="chat-area">
      <div id="chat-columns" class="chat-columns">
        <div class="placeholder-msg">← 选择模型后开始对话</div>
      </div>
      <div class="input-bar">
        <textarea id="user-input" rows="3" placeholder="输入消息... (Ctrl+Enter 发送)"></textarea>
        <button id="btn-send">发送</button>
      </div>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
